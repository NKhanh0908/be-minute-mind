services:

  # ================================
  # Redis
  # ================================
  redis:
    image: redis:7-alpine
    container_name: minutemind-redis
    restart: unless-stopped
    command: >
      sh -c '
        if [ -n "$$REDIS_PASSWORD" ]; then
          exec redis-server --requirepass "$$REDIS_PASSWORD" --maxmemory 256mb --maxmemory-policy allkeys-lru;
        else
          exec redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru;
        fi
      '
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "if [ -n \"$$REDIS_PASSWORD\" ]; then redis-cli -a \"$$REDIS_PASSWORD\" ping; else redis-cli ping; fi"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ================================
  # Spring Boot App
  # ================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: minutemind-app
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis
    deploy:
      resources:
        limits:
          memory: 512m

volumes:
  redis_data: