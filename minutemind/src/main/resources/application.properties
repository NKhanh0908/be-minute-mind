spring.application.name=minutemind

# =============================================
# Server
# =============================================
server.port=${PORT:8080}
server.servlet.context-path=${CONTEXT_PATH:/api/v1}

# =============================================
# Database Configuration (Supabase PostgreSQL)
# =============================================
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/minutemind_test}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hikari Connection Pool
spring.datasource.hikari.maximum-pool-size=${MAX_POOL_SIZE:5}
spring.datasource.hikari.minimum-idle=${MIN_IDLE:2}
spring.datasource.hikari.connection-timeout=${CONNECTION_TIMEOUT:30000}

# =============================================
# JPA Configuration
# =============================================
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.default_schema=public
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# =============================================
# Redis Configuration
# =============================================
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.username=${REDIS_USERNAME:default}
spring.data.redis.timeout=3000ms
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=2

# =============================================
# Security & JWT
# =============================================
app.jwt.secret=${JWT_SECRET:fDVidgXxPsgxmQnUPMECjPMLRJAeVZV9YuZpOCoOoBo=}
app.jwt.access-token-expiry=${JWT_TOKEN_EXPIRY:900000}
app.jwt.refresh-token-expiry=${JWT_REFRESH_TOKEN_EXPIRY:604800000}

# =============================================
# CORS
# =============================================
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173}

# =============================================
# Cloudinary
# =============================================
cloudinary.cloud_name=${CLOUDINARY_CLOUD_NAME:dummy}
cloudinary.api_key=${CLOUDINARY_API_KEY:dummy}
cloudinary.api_secret=${CLOUDINARY_API_SECRET:dummy}
cloudinary.folder=${CLOUDINARY_FOLDER:dummy}

# =============================================
# Swagger / OpenAPI
# =============================================
springdoc.swagger-ui.path=/swagger-ui/index.html