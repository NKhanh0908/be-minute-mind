spring.application.name=minutemind

# Database Configuration
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/minutemind_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:13524679}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# JPA Configuration
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.default_schema=public
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

springdoc.swagger-ui.path=/swagger-ui/index.html

server.servlet.context-path=/api/v1

# Redis Configuration
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=3000ms
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=2

# App Custom Properties
app.jwt.secret=${JWT_SECRET:fDVidgXxPsgxmQnUPMECjPMLRJAeVZV9YuZpOCoOoBo=}
app.jwt.access-token-expiry=900000
app.jwt.refresh-token-expiry=604800000
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:3001,http://localhost:5173}

# Cloudinary
cloudinary.cloud_name=${CLOUDINARY_CLOUD_NAME:ddeucv71n}
cloudinary.api_key=${CLOUDINARY_API_KEY:143313557212593}
cloudinary.api_secret=${CLOUDINARY_API_SECRET:mq2TXZwBgvGBjl1rcr45r23R8b0}
cloudinary.folder=${CLOUDINARY_FOLDER:mintutes-mind}