name: CI/CD Pipeline to Railway

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: # Cho phép kích hoạt chạy thử thủ công từ giao diện GitHub

jobs:
  build-and-test:
    name: Build & Run Unit Tests
    runs-on: ubuntu-latest
    services:
      redis:
        image: public.ecr.aws/docker/library/redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      postgres:
        image: public.ecr.aws/docker/library/postgres:15-alpine
        env:
          POSTGRES_DB: minutemind_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      PORT: 8080
      CONTEXT_PATH: /api/v1
      DATABASE_URL: jdbc:postgresql://localhost:5432/minutemind_test
      DB_USERNAME: postgres
      DB_PASSWORD: password
      MAX_POOL_SIZE: 5
      MIN_IDLE: 2
      CONNECTION_TIMEOUT: 30000
      JPA_DDL_AUTO: create-drop
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      REDIS_USERNAME: default
      JWT_SECRET: fDVidgXxPsgxmQnUPMECjPMLRJAeVZV9YuZpOCoOoBo=
      JWT_TOKEN_EXPIRY: 900000
      JWT_REFRESH_TOKEN_EXPIRY: 604800000
      CORS_ORIGINS: http://localhost:5173
      CLOUDINARY_CLOUD_NAME: dummy
      CLOUDINARY_API_KEY: dummy
      CLOUDINARY_API_SECRET: dummy
      CLOUDINARY_FOLDER: dummy

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Run Maven Test
      working-directory: ./minutemind
      # Chạy test kiểm thử chất lượng code trước khi cho phép deploy
      run: mvn clean test

