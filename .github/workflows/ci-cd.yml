name: CI/CD Pipeline to Railway

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: # Cho phép kích hoạt chạy thử thủ công từ giao diện GitHub

jobs:
  build-and-test:
    name: Build & Run Unit Tests
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Run Maven Test
      working-directory: ./minutemind
      # Chạy test kiểm thử chất lượng code trước khi cho phép deploy
      run: mvn clean test

  deploy:
    name: Deploy to Railway
    needs: build-and-test
    runs-on: ubuntu-latest
    # Chỉ deploy khi code được push/merge trực tiếp vào branch main (không chạy trên pull request)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Railway CLI
      run: npm i -g @railway/cli

    - name: Deploy to Railway
      working-directory: ./minutemind
      run: railway deploy
      env:
        RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
